# Example: a published npm CLI/library — the NO-DEPLOY archetype.
# Proves the "empty = skip" degradation path: no host, no runtime, no server-audit. The ship
# pipeline ends at merge + plan tick + tracker close-out, and reports the skipped gates explicitly.
# (Publishing to the registry is a release ritual, not a per-ticket ship gate — until you automate
# it, leave the identity/runtime gates empty rather than faking them.)
# Copy to workflow-profile.yaml and adjust.

project:
  name: "Snippet Vault"
  default_branch: main

tracker:
  kind: linear
  identifier_regex: "SNIP-\\d+"
  identifier_example: "SNIP-42"
  adapter: "adapters/linear.sh"
  get_issue:       "{adapter} issue get {id}"
  set_in_progress: "{adapter} issue status {id} 'In Progress'"
  set_in_review:   "{adapter} issue status {id} 'In Review'"
  set_done:        "{adapter} issue status {id} 'Done'"
  add_comment:     "{adapter} issue comment {id}"
  next_issue:      ""
  branch_from_issue: "branchName"
  branch_template:   "user/{id_lower}-{slug}"

vcs:
  commit_format: "{id}: {type}({scope}): {description}"
  wip_commit:    "{id}: {type}({scope}): wip - {description}"
  commit_hook_note: ""
  pr_title:  "{id}: {title}"
  pr_body_closes: "Closes {id}"
  pr_footer: ""

verify:
  lint:   "npm run lint"
  format: "npm run format:check"
  types:  ""                            # plain JS — no type gate (skill skips it, visibly)
  test:   "npm test"
  test_note: ""
  test_targeted: "npm test -- {path}"
  security: "npm audit --audit-level=high"

deploy:
  # No deploy surface: CI + merge only. Identity/runtime/health gates are OFF by profile —
  # flow-ship-issue ends at merge and says so ("no deploy surface — gates skipped by profile").
  ci_status:    "gh pr checks {pr} --watch"
  merge:        "gh pr merge {pr} --squash --delete-branch"
  deployed_sha: ""
  runtime_id:   ""
  health:       ""
  rollback:     ""

docs:
  plan:          "docs/project-plan.md"
  spec:          "docs/project-requirement.md"
  patterns:      ""
  architecture:  "docs/architecture/system-overview.md"
  decisions_dir: "docs/decisions"
  adr_template:  "docs/decisions/TEMPLATE.md"
  adr_index:     "docs/INDEX.md"
  retros_dir:    "docs/retros"
  ac_templates:  "docs/AC-templates.md"

architecture_rules: |
  - The core stays pure (no I/O); all filesystem access lives in the CLI layer.
  - No new runtime dependencies without an ADR.

ac_execution_keywords:
  - returns
  - prints
  - "exit code"
  - installs
  - published

review:
  fresh_eyes_agent: "flow:flow-code-reviewer"

cadence:
  team:    "Snippets"
  project: "Snippet Vault"
  active_cycle:   "{adapter} cycle active '{team}'"
  status_update:  "{adapter} project status-update '{project}'"

taxonomy:
  team_id: ""
  labels:
    - cli
    - core
    - docs
  ops_milestone: "Ops & Reliability"
  perpetual_milestones:
    - "Ops & Reliability"
  health_on_track_min: 0.50
  health_at_risk_min:  0.25

audit:
  host: ""                              # nothing runs anywhere — server-audit does not apply
