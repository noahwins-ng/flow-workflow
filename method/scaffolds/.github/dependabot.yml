# Automated dependency updates — pairs with the flow security gate (sanity-check CVE audit).
# flow-init sets __ECOSYSTEM__ from the detected stack (npm / pip / gomod / bundler / cargo / …).
version: 2
updates:
  - package-ecosystem: "__ECOSYSTEM__"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
